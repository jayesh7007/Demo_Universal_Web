<section id="home" class="hero">
  <div class="announcement-bar">
    <div class="announcement-track">
      <span>{{ config.hero.announcementText }}</span>
      <span>⭐ {{ config.business.tagline }}</span>
      <span>{{ config.hero.announcementText }}</span>
      <span>⭐ {{ config.business.tagline }}</span>
    </div>
  </div>

  <div class="hero-content">
    <div class="hero-text">
      <p class="eyebrow">{{ config.hero.eyebrow }}</p>
      <h1 class="hero-title">{{ config.hero.title }}</h1>
      <p class="hero-subtitle">{{ config.hero.subtitle }}</p>

      <p class="hero-description">{{ config.hero.description }}</p>

      <div class="hero-cta">
        <a [href]="config.contact.phoneLink" class="btn btn-primary">
          <i class="fas fa-phone"></i> Book Consultation
        </a>

        <a [href]="config.contact.whatsapp" target="_blank" rel="noopener" class="btn btn-secondary">
          <i class="fab fa-whatsapp"></i> WhatsApp Consultation
        </a>
      </div>
    </div>

    <div class="hero-image">
      <div class="cosmic-circle">
        <img [src]="config.owner.image" [alt]="config.owner.imageAlt" class="hero-img" onerror="this.style.background='#003857';this.style.display='flex'" />
        <div class="orbit"></div>
      </div>
    </div>
  </div>
</section>
